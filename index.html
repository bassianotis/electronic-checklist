<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>task-list-prototype</title>
  <!-- Preload Inter font for default theme -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    as="style">
</head>

<body>
  <script>
    // Apply theme and load fonts before React renders to prevent flash
    (function () {
      var theme = localStorage.getItem('theme') || 'default';
      document.documentElement.dataset.theme = theme;
      var link = document.createElement('link');
      link.rel = 'stylesheet';
      if (theme === 'scrapbook') {
        link.href = 'https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:wght@400;700&display=swap';
      } else {
        // Default theme uses Inter
        link.href = 'https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap';
      }
      document.head.appendChild(link);
    })();
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
