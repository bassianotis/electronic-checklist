version: '3.8'

services:
  web:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-4000}:3000"
    volumes:
      - task_data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET}
      - REGISTRATION_CODE=${REGISTRATION_CODE}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      - TZ=${TZ:-UTC}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  task_data:
